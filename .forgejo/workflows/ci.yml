name: CI
on: [push, pull_request]
jobs:
    check:
        runs-on: date
        steps:
            - uses: actions/checkout@v5
            - run: |
                  nix run github:juspay/omnix -- ci run --include-all-dependencies --github-output -- --builders ""
                  cat result | jq .result.ROOT.build.byName
    quick-bench:
        runs-on: date
        steps:
            - uses: actions/checkout@v5
            - run: |
                  nix build --builders "" .#packages.x86_64-linux.fasmfetch
                  nix shell --builders "" nixpkgs#hyperfine nixpkgs#fastfetch \
                      --command hyperfine --warmup=50 --runs=100 --shell=none \
                      "./result/bin/fasmfetch" "fastfetch" > result.txt
                      cat result.txt
